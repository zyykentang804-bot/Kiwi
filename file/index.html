<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILENT HUB | Free Scripts & Tools</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#161616;
  --card:#141414;
  --border:#242424;
  --border2:#333333;
  --text:#d0d0d0;
  --text2:#888888;
  --muted:#444444;
  --accent:#c0c0c0;
  --accent-bright:#ffffff;
  --green:#00cc77;
  --green2:#00ff99;
  --red:#cc2233;
  --red2:#ff3344;
  --shadow:rgba(255,255,255,0.05);
  --shadow2:rgba(255,255,255,0.03);
  --glow-green:0 0 16px rgba(0,204,119,0.5),0 0 32px rgba(0,204,119,0.2);
  --glow-red:0 0 16px rgba(204,34,51,0.5),0 0 32px rgba(204,34,51,0.2);
}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);overflow-x:hidden;min-height:100vh}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);
  pointer-events:none;z-index:999
}
body::after{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0
}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#particles span{position:absolute;border-radius:50%;animation:floatUp linear infinite}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}
.wrap{max-width:1400px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:2}

/* HEADER */
.header{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:1rem;margin-bottom:3rem;
  padding-bottom:1.5rem;border-bottom:1px solid var(--border);
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;width:180px;height:1px;
  background:linear-gradient(90deg,#555,transparent)
}
.logo-title{
  font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;
  color:#e0e0e0;display:inline-flex;align-items:center;gap:14px;letter-spacing:3px;
}
.dot-live{
  display:inline-block;width:11px;height:11px;background:var(--green);
  border-radius:50%;box-shadow:var(--glow-green);
  animation:blinkGreen 1.2s ease-in-out infinite;
}
@keyframes blinkGreen{
  0%,100%{opacity:1;box-shadow:var(--glow-green)}
  50%{opacity:0.2;box-shadow:none}
}
@keyframes blinkRed{
  0%,100%{opacity:1;box-shadow:var(--glow-red)}
  50%{opacity:0.2;box-shadow:none}
}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:3px;margin-top:5px}
.header-stats{display:flex;gap:0.8rem;flex-wrap:wrap}
.stat-pill{
  background:var(--card);border:1px solid var(--border);
  padding:5px 12px;border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:0.62rem;
  color:var(--text2);display:flex;align-items:center;gap:6px;
}
.stat-pill .s-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blinkGreen 1.5s infinite}

/* TABS */
.tabs{
  display:flex;gap:0;margin-bottom:2.5rem;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
.tab-btn{
  background:transparent;border:none;
  padding:0.8rem 1.5rem;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.85rem;
  color:var(--muted);cursor:pointer;transition:all 0.2s;
  letter-spacing:1px;border-bottom:2px solid transparent;
}
.tab-btn i{margin-right:6px;font-size:0.75rem}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent-bright);border-bottom:2px solid #666}
.tab-panel{display:none;animation:panelIn 0.25s ease}
.tab-panel.active-panel{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CAT TITLE */
.cat-title{
  display:flex;align-items:center;gap:10px;
  margin:2rem 0 1.2rem;
  font-family:'Orbitron',monospace;font-size:0.78rem;
  color:var(--accent);letter-spacing:2px;font-weight:700;
}
.cat-title::before{content:'//';color:var(--muted);font-size:0.7rem}
.cat-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* SCRIPT GRID */
.script-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.4rem;margin-top:1rem}
.script-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1.5rem;transition:all 0.3s ease;
  opacity:0;transform:translateY(18px);position:relative;overflow:hidden;
}
.script-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#444,transparent);
  opacity:0;transition:opacity 0.3s;
}
.script-card:hover::before{opacity:1}
.script-card.visible{opacity:1;transform:translateY(0)}
.script-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 10px 35px rgba(0,0,0,0.5)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.sc-icon{
  width:46px;height:46px;border-radius:10px;
  background:#1a1a1a;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:var(--accent);
}

/* STATUS BADGE */
.status-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:1px;
}
.status-badge.active{background:rgba(0,204,119,0.08);border:1px solid rgba(0,204,119,0.3);color:var(--green2)}
.status-badge.inactive{background:rgba(204,34,51,0.08);border:1px solid rgba(204,34,51,0.3);color:var(--red2)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-badge.active .status-dot{background:var(--green2);animation:blinkGreen 1s infinite}
.status-badge.inactive .status-dot{background:var(--red2);animation:blinkRed 1s infinite}

.sc-name{font-family:'Orbitron',monospace;font-size:0.88rem;font-weight:700;margin-bottom:5px;letter-spacing:1px;color:#ddd}
.sc-desc{font-size:0.77rem;color:var(--text2);margin-bottom:1rem;line-height:1.5}

/* TERMINAL */
.terminal-box{background:#080808;border:1px solid #1e1e1e;border-radius:7px;overflow:hidden;margin-bottom:1rem}
.terminal-header{
  background:#0e0e0e;border-bottom:1px solid #1e1e1e;
  padding:6px 12px;display:flex;align-items:center;gap:6px;
}
.t-dot{width:9px;height:9px;border-radius:50%}
.t-dot.r{background:#ff5f56}.t-dot.y{background:#ffbd2e}.t-dot.g{background:#27c93f}
.terminal-label{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:var(--muted);margin-left:auto;letter-spacing:1px}
.terminal-body{padding:10px 12px;position:relative}
.terminal-code{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:#aaa;line-height:1.6;word-break:break-all;padding-right:30px}
.t-prompt{color:#555}
.copy-btn{
  position:absolute;top:8px;right:8px;
  background:#1a1a1a;border:1px solid #2a2a2a;color:#888;
  width:24px;height:24px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:0.58rem;transition:all 0.2s;
}
.copy-btn:hover,.copy-btn.copied{background:#333;color:#ddd}

.sc-actions{display:flex;gap:8px}
.btn-get{
  flex:1;background:#1a1a1a;border:1px solid #333;color:#bbb;
  padding:8px;border-radius:6px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.77rem;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:1px;
}
.btn-get:hover{background:#252525;border-color:#555;color:#fff}
.free-tag{
  background:#111;border:1px solid #2a2a2a;color:var(--text2);
  padding:8px 10px;border-radius:6px;
  font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:1px;
  display:flex;align-items:center;
}

/* PORTFOLIO */
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:1.4rem;margin-top:1rem}
.port-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:all 0.3s ease;opacity:0;transform:translateY(18px);
}
.port-card.visible{opacity:1;transform:translateY(0)}
.port-card:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 45px rgba(0,0,0,0.6)}
.port-img-wrap{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#0d0d0d}
.port-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;filter:brightness(0.8)}
.port-card:hover .port-img-wrap img{transform:scale(1.05);filter:brightness(0.95)}
.port-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:3.2rem;background:linear-gradient(135deg,#111,#0a0a0a);
}
.port-dots{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.port-dot{
  position:absolute;width:7px;height:7px;border-radius:50%;
  background:var(--green);animation:blinkGreen 1.8s infinite;
  box-shadow:0 0 8px var(--green),0 0 16px var(--green);
}
.port-dot:nth-child(1){top:9px;left:9px;animation-delay:0s}
.port-dot:nth-child(2){top:9px;right:9px;animation-delay:0.5s}
.port-dot:nth-child(3){bottom:9px;left:9px;animation-delay:1s}
.port-dot:nth-child(4){bottom:9px;right:9px;animation-delay:1.5s}
.port-bracket{position:absolute;width:14px;height:14px;border-color:#555;border-style:solid;opacity:0.6}
.port-bracket.tl{top:5px;left:5px;border-width:2px 0 0 2px}
.port-bracket.tr{top:5px;right:5px;border-width:2px 2px 0 0}
.port-bracket.bl{bottom:5px;left:5px;border-width:0 0 2px 2px}
.port-bracket.br{bottom:5px;right:5px;border-width:0 2px 2px 0}
.port-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.92));
  padding:18px 12px 10px;
}
.port-game{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:#888;letter-spacing:2px;margin-bottom:3px}
.port-title{font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;color:#ddd}
.port-body{padding:12px 14px 14px}
.port-desc{font-size:0.76rem;color:var(--text2);line-height:1.5;margin-bottom:10px}
.port-tags{display:flex;gap:5px;flex-wrap:wrap}
.port-tag{
  background:#111;border:1px solid #222;color:#555;
  padding:3px 7px;border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:0.5rem;letter-spacing:1px;
}

/* EXECUTOR */
.executor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.1rem;margin-top:1rem}
.exec-card{
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:1.2rem;text-align:center;transition:all 0.3s ease;
  opacity:0;transform:translateY(18px);
}
.exec-card.visible{opacity:1;transform:translateY(0)}
.exec-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.5)}
.exec-icon{
  width:48px;height:48px;border-radius:10px;
  background:#1a1a1a;border:1px solid #2a2a2a;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:#999;margin:0 auto 10px;
}
.exec-name{font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;margin-bottom:4px;letter-spacing:1px;color:#ccc}
.exec-desc{font-size:0.65rem;color:var(--muted);margin-bottom:12px;line-height:1.4}
.exec-btn{
  background:#1a1a1a;border:1px solid #2a2a2a;color:#888;
  padding:6px 14px;border-radius:5px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.7rem;
  cursor:pointer;transition:all 0.2s;letter-spacing:1px;
  display:inline-flex;align-items:center;gap:5px;
}
.exec-btn:hover{background:#222;border-color:#444;color:#ddd}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.4rem;margin-top:1rem}
.contact-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:2rem;text-align:center;transition:all 0.3s ease;
  opacity:0;transform:translateY(18px);
}
.contact-card.visible{opacity:1;transform:translateY(0)}
.contact-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.contact-icon-wrap{
  width:58px;height:58px;border-radius:12px;margin:0 auto 1rem;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
}
.contact-title{font-family:'Orbitron',monospace;font-size:0.88rem;font-weight:700;margin-bottom:6px;letter-spacing:1px;color:#ccc}
.contact-desc{font-size:0.77rem;color:var(--text2);margin-bottom:1.2rem;line-height:1.5}
.contact-btn{
  border:none;padding:10px 22px;border-radius:7px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.85rem;
  cursor:pointer;transition:all 0.2s;
  display:inline-flex;align-items:center;gap:8px;color:white;letter-spacing:1px;
}
.contact-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}

/* FOOTER */
.footer{
  text-align:center;margin-top:4rem;padding:1.5rem;
  border-top:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:0.55rem;
  color:var(--muted);letter-spacing:2px;
}
.footer span{color:#666}

.scroll-anim{opacity:0;transform:translateY(18px);transition:all 0.35s ease}
.scroll-anim.visible{opacity:1;transform:translateY(0)}

@media(max-width:700px){
  .wrap{padding:1rem}
  .logo-title{font-size:1.3rem}
  .tab-btn{padding:0.6rem 0.9rem;font-size:0.75rem}
  .script-grid,.portfolio-grid{grid-template-columns:1fr}
}
</style>
</head>

function escA(s){ return String(s).replace(/"/g,'&quot;') }

function renderScripts(){
  const g = document.getElementById('scriptGrid'); if(!g) return;
  g.innerHTML = scripts.map((s,i) => {
    const ls = `loadstring(game:HttpGet("${BASE}/api/raw?file=${s.file}"))()`;

          <span class="t-dot r"></span><span class="t-dot y"></span><span class="t-dot g"></span>
          <span class="terminal-label">LOADSTRING.lua</span>
        </div>
        <div class="terminal-body">
          <div class="terminal-code"><span class="t-prompt">&gt; </span>${esc(ls)}</div>
          <button class="copy-btn" data-copy="${escA(ls)}"><i class="fas fa-copy"></i></button>
        </div>
      </div>
      <div class="sc-actions">
        <button class="btn-get" onclick="window.open('https://discord.gg/YxGgy9MYe','_blank')">
          <i class="fab fa-discord"></i> GET VIA DISCORD
        </button>
        <div class="free-tag">FREE</div>
      </div>
    </div>`
  }).join('');
  g.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copy).catch(()=>{});
      btn.classList.add('copied');
      btn.innerHTML='<i class="fas fa-check"></i>';
      setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<i class="fas fa-copy"></i>' },1800);
    });
  });
}

function renderPortfolio(){
  const g = document.getElementById('portfolioGrid'); if(!g) return;
  g.innerHTML = portfolio.map((p,i) => `
    <div class="port-card scroll-anim" style="transition-delay:${i*0.07}s">
      <div class="port-img-wrap">
        <div class="port-placeholder">${p.emoji}</div>
        <div class="port-dots">
          <div class="port-dot"></div><div class="port-dot"></div>
          <div class="port-dot"></div><div class="port-dot"></div>
          <div class="port-bracket tl"></div><div class="port-bracket tr"></div>
          <div class="port-bracket bl"></div><div class="port-bracket br"></div>
        </div>
        <div class="port-overlay">
          <div class="port-game">${p.game}</div>
          <div class="port-title">${p.title}</div>
        </div>
      </div>
      <div class="port-body">
        <div class="port-desc">${p.desc}</div>
        <div class="port-tags">${p.tags.map(t=>`<span class="port-tag">${t}</span>`).join('')}</div>
      </div>
    </div>`
  ).join('');
}

function renderExec(data, id){
  const g = document.getElementById(id); if(!g) return;
  g.innerHTML = data.map((e,i) => `
    <div class="exec-card scroll-anim" style="transition-delay:${i*0.07}s">
      <div class="exec-icon"><i class="${e.icon}"></i></div>
      <div class="exec-name">${e.name}</div>
      <div class="exec-desc">${e.desc}</div>
      <button class="exec-btn" data-link="${e.link}"><i class="fas fa-download"></i> DOWNLOAD</button>
    </div>`
  ).join('');
  g.querySelectorAll('.exec-btn').forEach(b => b.addEventListener('click',()=>window.open(b.dataset.link,'_blank')));
}

function renderContacts(){
  const g = document.getElementById('contactGrid'); if(!g) return;
  g.innerHTML = contacts.map(c => `
    <div class="contact-card scroll-anim">
      <div class="contact-icon-wrap" style="background:${c.bg}15;border:1px solid ${c.bg}33">
        <i class="${c.icon}" style="color:${c.bg}"></i>
      </div>
      <div class="contact-title">${c.name}</div>
      <div class="contact-desc">${c.desc}</div>
      <button class="contact-btn" style="background:${c.bg}" data-link="${c.link}">
        <i class="${c.icon}"></i> CONTACT NOW
      </button>
    </div>`
  ).join('');
  g.querySelectorAll('.contact-btn').forEach(b=>b.addEventListener('click',()=>window.open(b.dataset.link,'_blank')));
}

function createParticles(){
  const c = document.getElementById('particles'); if(!c) return;
  for(let i=0;i<50;i++){
    const p = document.createElement('span');
    const sz = Math.random()*3+1;
    const col = Math.random()>0.5 ? '#444' : '#333';
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};animation-duration:${Math.random()*18+10}s;animation-delay:${Math.random()*12}s;opacity:0`;
    c.appendChild(p);
  }
}

const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target) } });
},{threshold:0.08,rootMargin:'0px 0px -20px 0px'});
function observe(){ document.querySelectorAll('.scroll-anim').forEach(el=>io.observe(el)) }

const tabPanels = {
  script:    document.getElementById('tab-script'),
  portfolio: document.getElementById('tab-portfolio'),
  executor:  document.getElementById('tab-executor'),
  contact:   document.getElementById('tab-contact')
};
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    Object.values(tabPanels).forEach(p=>p&&p.classList.remove('active-panel'));
    const t = btn.dataset.tab;
    if(tabPanels[t]) tabPanels[t].classList.add('active-panel');
    setTimeout(observe,100);
  });
});

renderScripts();
renderPortfolio();
renderExec(pcExecs,'pcExecGrid');
renderExec(mobileExecs,'mobileExecGrid');
renderContacts();
createParticles();
setTimeout(observe,200);

})();
</script>
</body>
</html>
